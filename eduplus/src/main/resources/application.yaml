spring:
  application:
    name: springSecurity
  datasource:
    url: jdbc:mysql://localhost:3306/eduplus_db?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

app:
  jwt:
    secret: EduPlusSecretKeyPourSignerLesTokensJWTDoitEtre32Chars
    access-token-expiration: 900000
    refresh-token-expiration: 604800000